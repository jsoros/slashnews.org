name: deploy-branch-version

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

# Default permissions - read only
permissions:
  contents: read

# Separate permission blocks for each job to minimize exposure

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'pages' || format('pages-{0}', github.ref) }}
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Only grant elevated permissions to repository owner
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      CI: true
      VITEST: true
    strategy:
      matrix:
        bun-version: [latest]
    steps:
      - name: Validate actor is repository owner
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          ACTOR="${{ github.actor }}"
          if [ "$ACTOR" != "$REPO_OWNER" ]; then
            echo "ERROR: Only the repository owner ($REPO_OWNER) can trigger deployments."
            echo "Current actor: $ACTOR"
            exit 1
          fi
          echo "Actor validation passed: $ACTOR"
      - uses: actions/checkout@v4
      - name: Setup Bun ${{ matrix.bun-version }}
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - run: bun install
      - name: Verify environment and dependencies
        run: |
          echo "=== Environment Information ==="
          bun --version
          node --version
          echo "CI: $CI"
          echo "VITEST: $VITEST"
          echo ""
          echo "=== Dependency Verification ==="
          bun pm ls || echo "Dependency issues detected"
          echo ""
          echo "=== TypeScript Version ==="
          bunx tsc --version
          echo ""
      - run: bun run lint
      - name: Build with correct base path
        env:
          VITE_BASE_PATH: ${{ github.ref == 'refs/heads/main' && './' || format('/branches/{0}/', github.ref_name) }}
        run: bun run build
      - name: Run tests with memory monitoring
        run: |
          echo "Available memory before tests:"
          free -h
          bun run test:run
          echo "Available memory after tests:"
          free -h
      - name: Setup Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5
      - name: Upload artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist/'
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
