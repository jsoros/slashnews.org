# Dependabot Auto-Merge
# Note: Dependabot cannot trigger workflows that use repository secrets or require owner permissions.
# This workflow attempts to run on the main branch via a push trigger, 
# ensuring it has access to the owner's GITHUB_TOKEN permissions.

name: Dependabot Auto-Merge

on:
  push:
    branches:
      - main

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot PRs
        run: |
          # Use gh CLI to find open PRs created by dependabot
          prs=$(gh pr list --author "dependabot[bot]" --state open --json url,number -q '.[].url')
          for pr in $prs; do
            echo "Processing $pr"
            # Auto-merge the PR
            gh pr merge --auto --merge "$pr"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
