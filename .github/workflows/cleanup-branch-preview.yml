name: Cleanup Branch Preview

on:
  delete:
  pull_request:
    types: [closed]

# Default permissions - read only
permissions:
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    # Only grant write permissions to repository owner
    permissions:
      contents: write
    if: github.event_name == 'delete' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    steps:
      - name: Validate actor is repository owner
        run: |
          REPO_OWNER="${{ github.repository_owner }}"
          ACTOR="${{ github.actor }}"
          if [ "$ACTOR" != "$REPO_OWNER" ]; then
            echo "ERROR: Only the repository owner ($REPO_OWNER) can trigger cleanup operations."
            echo "Current actor: $ACTOR"
            exit 1
          fi
          echo "Actor validation passed: $ACTOR"
      - name: Determine branch name
        id: branch
        run: |
          if [ "${{ github.event_name }}" == "delete" ]; then
            echo "branch_name=${{ github.event.ref }}" >> $GITHUB_OUTPUT
          else
            echo "branch_name=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT
          fi

      - name: Sanitize branch name to kebab-case
        id: sanitize
        run: |
          # Convert branch name to kebab-case
          BRANCH_NAME="${{ steps.branch.outputs.branch_name }}"
          # Convert to lowercase
          BRANCH_NAME=$(echo "$BRANCH_NAME" | tr '[:upper:]' '[:lower:]')
          # Replace slashes, underscores, spaces, and other special chars with dashes
          BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/[\/_ ]/-/g' | sed 's/[^a-z0-9-]//g')
          # Remove consecutive dashes
          BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/-\+/-/g')
          # Trim dashes from start and end
          BRANCH_NAME=$(echo "$BRANCH_NAME" | sed 's/^-//; s/-$//')
          echo "branch_name=$BRANCH_NAME" >> $GITHUB_OUTPUT
          echo "Sanitized branch name: $BRANCH_NAME (from ${{ steps.branch.outputs.branch_name }})"

      - name: Cleanup branch preview
        run: |
          # Configure git
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone gh-pages branch
          git clone --branch gh-pages "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" gh-pages-deploy
          cd gh-pages-deploy

          # Remove branch deployment if it exists
          if [ -d "branches/${{ steps.sanitize.outputs.branch_name }}" ]; then
            rm -rf "branches/${{ steps.sanitize.outputs.branch_name }}"

            # Commit and push
            git add .
            git commit -m "Cleanup branch preview: ${{ steps.sanitize.outputs.branch_name }} (from ${{ steps.branch.outputs.branch_name }})"
            git push

            echo "Cleaned up branch preview for: ${{ steps.sanitize.outputs.branch_name }} (original: ${{ steps.branch.outputs.branch_name }})"
          else
            echo "No branch preview found for: ${{ steps.sanitize.outputs.branch_name }} (original: ${{ steps.branch.outputs.branch_name }})"
          fi
