<!DOCTYPE html>
<html>
<head>
  <title>Branch Previews</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 50px auto; padding: 20px; }
    h1 { color: #333; }
    ul { list-style: none; padding: 0; }
    li { margin: 10px 0; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Branch Preview Deployments</h1>
  <ul id="branches"></ul>
  <script>
    // Sanitize branch name to kebab-case (matches the workflow logic)
    function sanitizeBranchName(name) {
      return name
        .toLowerCase()
        .replace(/[\/_ ]/g, '-')
        .replace(/[^a-z0-9-]/g, '')
        .replace(/-+/g, '-')
        .replace(/^-|-$/g, '');
    }

    fetch('https://api.github.com/repos/jsoros/slashnews.org/branches')
      .then(r => r.json())
      .then(branches => {
        const list = document.getElementById('branches');
        branches
          .filter(b => b.name !== 'main' && b.name !== 'gh-pages')
          .forEach(b => {
            const sanitized = sanitizeBranchName(b.name);
            const li = document.createElement('li');
            li.innerHTML = '<a href="' + sanitized + '/">' + b.name + '</a> → <code>' + sanitized + '</code>';
            list.appendChild(li);
          });
      });
  </script>
</body>
</html>
